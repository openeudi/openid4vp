name: OIDF Conformance (release full-plan)

on:
  push:
    tags: ["v*"]
  # Allow manual runs (e.g. to validate the conformance harness without cutting
  # a release tag). The release-artefact attach step is guarded to tag pushes.
  workflow_dispatch: {}

permissions:
  contents: write
  packages: read

jobs:
  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Log in to GHCR (read)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Bring up suite
        working-directory: docker/oidf-conformance-suite
        run: docker compose up -d

      - name: Wait for suite health
        run: |
          for i in $(seq 1 18); do
            if curl -fsSk https://localhost:8443/api/runner/available > /dev/null; then exit 0; fi
            sleep 5
          done
          docker compose -f docker/oidf-conformance-suite/docker-compose.yml logs
          exit 1

      - name: Run 1final profile matrix
        id: run-profiles
        run: |
          set +e
          profiles="1final-happy-mdl 1final-happy-sdjwt 1final-neg-session-transcript 1final-neg-kb-jwt-nonce 1final-neg-kb-jwt-aud 1final-neg-kb-jwt-signature 1final-neg-sd-hash 1final-neg-credential-signature 1final-neg-iat-future 1final-neg-iat-past"
          failed=""
          for profile in $profiles; do
            echo "::group::Profile $profile"
            npm run oidf:ci -- --profile="$profile" --suite-base=https://localhost:8443 --output-dir="./oidf-result-$profile"
            status=$?
            echo "::endgroup::"
            echo "profile=$profile exit=$status"
            if [ "$status" -ne 0 ]; then
              failed="$failed $profile"
            fi
          done
          if [ -n "$failed" ]; then
            echo "Gating profile(s) failed:$failed"
            exit 1
          fi

      - name: Upload result artefact (1final-happy-mdl)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: oidf-result-1final-happy-mdl-${{ github.ref_name }}
          path: ./oidf-result-1final-happy-mdl/

      - name: Upload result artefact (1final-happy-sdjwt)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: oidf-result-1final-happy-sdjwt-${{ github.ref_name }}
          path: ./oidf-result-1final-happy-sdjwt/

      - name: Upload result artefact (1final-neg-session-transcript)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: oidf-result-1final-neg-session-transcript-${{ github.ref_name }}
          path: ./oidf-result-1final-neg-session-transcript/

      - name: Upload result artefact (1final-neg-kb-jwt-nonce)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: oidf-result-1final-neg-kb-jwt-nonce-${{ github.ref_name }}
          path: ./oidf-result-1final-neg-kb-jwt-nonce/

      - name: Upload result artefact (1final-neg-kb-jwt-aud)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: oidf-result-1final-neg-kb-jwt-aud-${{ github.ref_name }}
          path: ./oidf-result-1final-neg-kb-jwt-aud/

      - name: Upload result artefact (1final-neg-kb-jwt-signature)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: oidf-result-1final-neg-kb-jwt-signature-${{ github.ref_name }}
          path: ./oidf-result-1final-neg-kb-jwt-signature/

      - name: Upload result artefact (1final-neg-sd-hash)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: oidf-result-1final-neg-sd-hash-${{ github.ref_name }}
          path: ./oidf-result-1final-neg-sd-hash/

      - name: Upload result artefact (1final-neg-credential-signature)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: oidf-result-1final-neg-credential-signature-${{ github.ref_name }}
          path: ./oidf-result-1final-neg-credential-signature/

      - name: Upload result artefact (1final-neg-iat-future)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: oidf-result-1final-neg-iat-future-${{ github.ref_name }}
          path: ./oidf-result-1final-neg-iat-future/

      - name: Upload result artefact (1final-neg-iat-past)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: oidf-result-1final-neg-iat-past-${{ github.ref_name }}
          path: ./oidf-result-1final-neg-iat-past/

      - name: Append summary to step summary
        if: always()
        run: |
          for dir in ./oidf-result-1final-*; do
            if [ -f "$dir/summary.md" ]; then
              echo "### $(basename "$dir")" >> "$GITHUB_STEP_SUMMARY"
              cat "$dir/summary.md" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      - name: Attach to GitHub Release
        # Only on tag pushes — manual (workflow_dispatch) runs have no release.
        if: always() && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.4.0
        with:
          files: ./oidf-result-1final-*/*
          fail_on_unmatched_files: false

      - name: Tear down suite
        if: always()
        working-directory: docker/oidf-conformance-suite
        run: docker compose down --volumes
