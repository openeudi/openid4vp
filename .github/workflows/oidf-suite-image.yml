name: OIDF Suite Image (build + push to GHCR)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Upstream conformance-suite git ref (tag or commit SHA)'
        required: true
        type: string
        default: 'release-v5.1.42'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/oidf-conformance-suite

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Clone upstream conformance-suite (gitlab)
        run: |
          git clone --depth 1 --branch "${{ inputs.ref }}" https://gitlab.com/openid/conformance-suite.git conformance-suite

      - name: Set up Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build the suite JAR
        working-directory: conformance-suite
        run: mvn -B clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: conformance-suite
          file: conformance-suite/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ inputs.ref }}
