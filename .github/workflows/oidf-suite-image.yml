name: OIDF Suite Image (build + push to GHCR)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Upstream conformance-suite git ref (tag or commit SHA)'
        required: true
        type: string
        default: 'release-v5.1.42'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/oidf-conformance-suite

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upstream conformance-suite
        uses: actions/checkout@v4
        with:
          repository: openid/conformance-suite
          ref: ${{ inputs.ref }}
          path: conformance-suite

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build the suite JAR
        working-directory: conformance-suite
        run: mvn -B clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: conformance-suite
          file: conformance-suite/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ inputs.ref }}
