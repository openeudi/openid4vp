services:
  mongodb:
    image: mongo:6.0.13
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 5s
      retries: 12

  server:
    image: ghcr.io/openeudi/oidf-conformance-suite:release-v5.1.42
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGODB_HOST=mongodb
      - JAVA_EXTRA_ARGS=-Xmx2g -Dfintechlabs.devmode=true
      - BASE_URL=https://localhost:8443
      # Spring requires non-empty client_id values even when devmode bypasses OAuth.
      # The image's entrypoint substitutes these into spring.security.oauth2.client.registration.<provider>.client-id.
      - OIDC_GOOGLE_CLIENTID=devmode-placeholder
      - OIDC_GOOGLE_SECRET=devmode-placeholder
      - OIDC_GITLAB_CLIENTID=devmode-placeholder
      - OIDC_GITLAB_SECRET=devmode-placeholder
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -fsS -H 'X-Forwarded-Proto: https' -H 'X-Forwarded-Host: localhost' http://localhost:8080/api/runner/available || exit 1"
      interval: 5s
      timeout: 5s
      retries: 24

  nginx:
    image: nginx:1.27.3
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - '8443:8443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-certs:/etc/ssl
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ ! -f /etc/ssl/certs/nginx-selfsigned.crt ]; then
          openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
            -keyout /etc/ssl/private/nginx-selfsigned.key \
            -out /etc/ssl/certs/nginx-selfsigned.crt \
            -subj "/CN=localhost"
        fi
        nginx -g 'daemon off;'

  # TLS termination for the in-process Node verifier-server. The orchestrator's
  # verifier still binds locally on host.docker.internal:8080 (plain HTTP, easy
  # to test and debug), but the auth-request published in request_uri /
  # response_uri now uses https://host.docker.internal:8444 — clearing the two
  # standing `harness`-category allow-list entries (EnsureRequestUriIsHttps and
  # EnsureValidResponseUriForAuthorizationEndpointRequest).
  #
  # NOTE — pending integration work:
  #   1. The suite's Java HTTP client must trust this self-signed leaf.
  #      Mount the cert into the `server` container and pass:
  #        -Djavax.net.ssl.trustStore=/etc/ssl/openeudi-truststore.jks
  #        -Djavax.net.ssl.trustStorePassword=changeit
  #      via JAVA_EXTRA_ARGS, with the truststore prebuilt to include the
  #      system CAs PLUS this leaf. (See README in this directory.)
  #   2. Orchestrator must update verifier-server's externalBaseUrl to
  #      https://host.docker.internal:8444.
  #   3. Then drop both `harness` entries from scripts/oidf-ci/allowlist.json.
  verifier-nginx:
    image: nginx:1.27.3
    restart: unless-stopped
    ports:
      - '8444:8444'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./verifier-nginx.conf:/etc/nginx/nginx.conf:ro
      - verifier-nginx-certs:/etc/ssl
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ ! -f /etc/ssl/certs/verifier-selfsigned.crt ]; then
          openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
            -keyout /etc/ssl/private/verifier-selfsigned.key \
            -out /etc/ssl/certs/verifier-selfsigned.crt \
            -subj "/CN=host.docker.internal" \
            -addext "subjectAltName=DNS:host.docker.internal,DNS:localhost,IP:127.0.0.1"
        fi
        nginx -g 'daemon off;'

volumes:
  nginx-certs:
  verifier-nginx-certs:
