worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /dev/stdout;
    error_log  /dev/stderr;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    ssl_certificate     /etc/ssl/certs/verifier-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/verifier-selfsigned.key;

    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    resolver 127.0.0.11 ipv6=off;

    # TLS termination for the in-process Node verifier-server. Listens on 8444
    # inside the container (mapped to 8444 on the host); reverse-proxies to the
    # host's port 8080 where the orchestrator's verifier listens. The auth-
    # request the suite fetches publishes `https://host.docker.internal:8444/...`.
    server {
        listen 8444 ssl;
        server_name host.docker.internal localhost;

        location / {
            proxy_pass http://host.docker.internal:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }
    }
}
